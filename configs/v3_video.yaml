# V3 — world-model JEPA sur dataset vidéo Wan 2.2 (256×256, T=16)
# Config nuit DARKSTAR 2026-05-01 — voir ~/.claude/plans/generic-snuggling-scott.md

obs_shape: [3, 256, 256]
action_dim: 4
latent_dim: 512

# Architecture V3
encoder_type: conv5         # 5 convs stride-2 → 8x8 feature map
dynamics_type: transformer  # causal pre-norm 4×8×512
hidden_dim: 512
seq_len: 16

# Entraînement
learning_rate: 0.0001        # baisse 3e-4 -> 1e-4 apres run V3.0 NaN epoch 6 (rollout T=16 + bf16 + grad explode)
batch_size: 24
max_epochs: 30               # suffisant, pas besoin de 50 (partial 10 epochs convergeait deja)
rollout_warmup_epochs: 10    # warmup plus long (10 epochs en 1-step) pour stabiliser avant T=16
use_amp: false               # fp32 stable, bf16 a fait diverger en epoch 6 sur 1500 clips

# VICReg — augmenté (V2 default 0.04 trop faible, eval rank V1.8 = 8%)
lambda_var: 0.15
lambda_cov: 0.04
lambda_mean: 0.01

# Pas de signal reward/done sur dataset vidéo passif
use_reward_head: false
use_done_head: false
